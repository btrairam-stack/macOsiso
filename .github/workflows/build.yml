name: Build macOS ISO

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Download gibMacOS
        run: |
          curl -L "https://raw.githubusercontent.com/corpnewt/gibMacOS/master/gibMacOS.py" -o gibMacOS.py
          python3 gibMacOS.py -n "10.15.7" --only-download

      - name: Create ISO
        run: |
          PKG=$(find ~/macOS\ Downloads -name "InstallAssistant.pkg" | head -1)
          hdiutil create -o /tmp/Catalina -size 8500m -volname "Catalina" -layout SPUD -fs HFS+J
          hdiutil attach /tmp/Catalina.dmg -noverify -mountpoint /Volumes/Catalina
          sudo installer -pkg "$PKG" -target /Volumes/Catalina
          hdiutil detach /Volumes/Catalina
          hdiutil convert /tmp/Catalina.dmg -format UDTO -o ~/Catalina
          mv ~/Catalina.cdr ~/Catalina.iso

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: Catalina-ISO
          path: ~/Catalina.iso
