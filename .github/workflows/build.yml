name: Build macOS ISO

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Download Catalina
        run: |
          mkdir -p ~/catalina
          curl -L "https://swcdn.apple.com/content/downloads/26/37/001-68446/r1dbqtmf3mtpikjnd04cq31p4jk91dceh8/InstallAssistantAuto.pkg" -o ~/catalina/InstallAssistantAuto.pkg
          pkgutil --expand ~/catalina/InstallAssistantAuto.pkg ~/catalina/expanded
          ls -la ~/catalina/expanded

      - name: Find and extract installer
        run: |
          find ~/catalina/expanded -name "*.pkg" -o -name "*.dmg" | head -20
          find ~/catalina/expanded -type f | head -30

      - name: Upload findings
        uses: actions/upload-artifact@v4
        with:
          name: findings
          path: ~/catalina/expanded
