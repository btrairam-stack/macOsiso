name: Build macOS ISO

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Clone and Download gibMacOS
        run: |
          git clone https://github.com/corpnewt/gibMacOS.git
          cd gibMacOS
          python3 gibMacOS.py -v 10.15.7 -b 19H15 --no-interactive
          echo "=== Searching for downloaded files ==="
          find . -name "*.pkg" 2>/dev/null
          find . -name "*.dmg" 2>/dev/null

      - name: Create ISO
        run: |
          cd gibMacOS
          PKG=$(find . -name "InstallAssistant.pkg" 2>/dev/null | head -1)
          echo "Found PKG: $PKG"
          hdiutil create -o /tmp/Catalina -size 8500m -volname "Catalina" -layout SPUD -fs HFS+J
          hdiutil attach /tmp/Catalina.dmg -noverify -mountpoint /Volumes/Catalina
          sudo installer -pkg "$PKG" -target /Volumes/Catalina
          hdiutil detach /Volumes/Catalina
          hdiutil convert /tmp/Catalina.dmg -format UDTO -o /tmp/CatalinaFinal
          mv /tmp/CatalinaFinal.cdr /tmp/Catalina.iso

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: Catalina-ISO
          path: /tmp/Catalina.iso
