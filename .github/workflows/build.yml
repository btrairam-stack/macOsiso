name: Build macOS ISO

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Download Catalina
        run: |
          curl -L "https://raw.githubusercontent.com/corpnewt/gibMacOS/master/gibMacOS.py" -o gibMacOS.py
          python3 gibMacOS.py -n "10.15.7" -m --catalogurl https://swscan.apple.com/content/catalogs/others/index-10.15-10.14-10.13-10.12-10.11-10.10-10.9-mountainlion-lion-snowleopard-leopard.merged-1.sucatalog

      - name: Create ISO
        run: |
          hdiutil create -o /tmp/Catalina -size 8500m -volname "Catalina" -layout SPUD -fs HFS+J
          hdiutil attach /tmp/Catalina.dmg -noverify -mountpoint /Volumes/Catalina
          sudo installer -pkg ~/macOS\ Downloads/publicrelease/*/InstallAssistant.pkg -target /Volumes/Catalina
          hdiutil detach /Volumes/Catalina
          hdiutil convert /tmp/Catalina.dmg -format UDTO -o ~/Catalina
          mv ~/Catalina.cdr ~/Catalina.iso

      - name: Upload ISO
        uses: actions/upload-artifact@v3
        with:
          name: Catalina-ISO
          path: ~/Catalina.iso
